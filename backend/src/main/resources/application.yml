spring:
  application:
    name: praetor-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/praetor}
    username: ${SPRING_DATASOURCE_USERNAME:praetor}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me-local-only}
  jpa:
    # Schema owned by db/schema.sql (applied by postgres initdb). Never let
    # Hibernate create/alter tables — validate once entities exist, none for now.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080

# Actuator health includes the DB check → /actuator/health = UP proves DB wiring.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# Judge sandbox tunables. Bridged from the SANDBOX_*/JUDGE_WORKERS env (docker-compose
# passes them; .env / .env.example define them). Defaults let the app boot standalone.
# NOTE: the ${ENV:default} bridge is required — Spring relaxed binding does NOT map
# SANDBOX_MEM_MB to praetor.judge.mem-mb on its own.
praetor:
  judge:
    image:       ${SANDBOX_IMAGE:praetor-judge:latest}
    cpu-seconds: ${SANDBOX_CPU_SECONDS:2}
    mem-mb:      ${SANDBOX_MEM_MB:256}
    pids-max:    ${SANDBOX_PIDS_MAX:64}
    workers:     ${JUDGE_WORKERS:2}
    # deployment constants (tied to docker-compose named volume), not per-dev env
    work-dir:     /judge
    volume-name:  praetor_work
    oom-inspect:  false
