server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → backend service.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket/STOMP (live standings, submission status) → backend.
    # Prefix match also covers SockJS's /ws/info + XHR fallback paths.
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Long-lived sockets: don't let nginx drop an idle STOMP connection.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
