<h1 class="page-title">Problems</h1>

<p *ngIf="loading" class="muted">Loading…</p>
<p *ngIf="error" class="error-message">{{ error }}</p>

<table *ngIf="!loading && !error" class="problem-table">
  <thead>
    <tr>
      <th>Title</th>
      <th class="col-diff">Difficulty</th>
      <th class="col-mode">Judge</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of problems">
      <td><a [routerLink]="['/problems', p.slug]">{{ p.title }}</a></td>
      <td class="col-diff num">{{ p.difficulty }}</td>
      <td class="col-mode"><span class="tag">{{ p.judgeMode }}</span></td>
    </tr>
    <tr *ngIf="problems.length === 0">
      <td colspan="3" class="muted">No problems yet.</td>
    </tr>
  </tbody>
</table>
