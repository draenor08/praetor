<section class="page-shell">
  <div class="page-card">
    <div class="page-heading">
      <div>
        <h1>Problems</h1>
        <p>Search and filter your next challenge.</p>
      </div>
      <div class="filters">
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Search by title or tag"
          class="search-input"
        />
        <select [(ngModel)]="selectedDifficulty" class="filter-select">
          <option>All</option>
          <option>Easy</option>
          <option>Medium</option>
          <option>Hard</option>
        </select>
      </div>
    </div>

    <div class="problem-list">
      <article class="problem-card" *ngFor="let problem of filteredProblems">
        <div class="problem-main">
          <h3>{{ problem.title }}</h3>
          <div class="tag-row">
            <span class="tag" *ngFor="let tag of problem.tags">{{ tag }}</span>
          </div>
        </div>
        <span class="difficulty" [ngClass]="problem.difficulty.toLowerCase()">{{ problem.difficulty }}</span>
      </article>
    </div>
  </div>
</section>
